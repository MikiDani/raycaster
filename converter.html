<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converter</title>
    <style>
        #div1, #div2 {
            width: 120px;
            height: 120px;
            margin: 10px;
            padding: 30px;
        }
    </style>
</head>
<body>
<h3>Converter</h3>    
    <div id="div1">Original</div>
    <div id="div2">Darken</div>
</body>
<script>
    function colorDarkening(color, size) {
        let r = ((parseInt(color.substring(1, 3), 16) - size) > 0) ? parseInt(color.substring(1, 3), 16) - size : 0;
        let g = ((parseInt(color.substring(3, 5), 16) - size) > 0) ? parseInt(color.substring(3, 5), 16) - size : 0;
        let b = ((parseInt(color.substring(5, 7), 16) - size) > 0) ? parseInt(color.substring(5, 7), 16) - size : 0;

        return '#' + ('0' + r.toString(16)).slice(-2) + ('0' + g.toString(16)).slice(-2) + ('0' + b.toString(16)).slice(-2);
    }

    let color = '#aaeeff';

    document.getElementById('div1').style.backgroundColor = color;

    document.getElementById('div2').style.backgroundColor = colorDarkening(color, 100);

</script>
</html>
